<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福庫銀行 Fuku-Bank - 貸款契約書</title>
    <style>
        /* 基礎重置 - 禪意水墨風格 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f3e9; /* 溫慢宣紙米色 */
            font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* 佈局容器 */
        .wrapper {
            width: 100%;
            background-color: #f8f3e9;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fdfbf7;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid #e8e2d5;
        }
 
        /* 頂部 Header */
        .header {
            padding: 45px 30px 30px;
            text-align: center;
            border-bottom: 1px solid #e8e2d5;
            position: relative;
        }
        
        .header-logo {
            font-size: 26px;
            font-weight: 500;
            color: #3e3a35;
            letter-spacing: 4px;
            margin: 0;
            font-family: "Noto Serif TC", "Songti TC", serif;
        }
        
        .header-subtitle {
            color: #8c867a;
            font-size: 13px;
            margin-top: 12px;
            letter-spacing: 6px;
            font-family: "Noto Serif TC", "Songti TC", serif;
        }
 
        /* 內容區域 */
        .content {
            padding: 40px 40px 35px;
            color: #4a4641;
            line-height: 1.8;
            font-size: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        .content p {
            margin-top: 0;
            margin-bottom: 16px;
        }
 
        .greeting {
            font-size: 19px;
            font-weight: 600;
            color: #3e3a35;
            margin-bottom: 24px;
            margin-top: 0;
            font-family: "Noto Serif TC", "Songti TC", serif;
        }
 
        /* 表格設計 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            background-color: #fdfbf7;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #e8e2d5;
        }
        .data-table th, .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #e8e2d5;
            text-align: left;
            font-size: 14px;
        }
        .data-table tr:last-child th, .data-table tr:last-child td {
            border-bottom: none;
        }
        .data-table th {
            width: 140px;
            color: #757065;
            font-weight: 500;
            background-color: #f5efe6;
            border-right: 1px solid #e8e2d5;
        }
        .data-table td {
            color: #3e3a35;
            font-weight: 500;
        }
 
        /* 底部 Footer */
        .footer {
            background-color: #f5efe6;
            padding: 35px 40px;
            text-align: center;
            border-top: 1px solid #e8e2d5;
        }
        
        .footer p {
            margin: 0 0 8px;
            font-size: 12px;
            color: #8c867a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        .footer-logo {
            font-family: "Noto Serif TC", "Songti TC", serif;
            color: #757065;
            font-size: 14px;
            margin-top: 20px;
            letter-spacing: 2px;
        }
 
        /* 響應式調整 */
        @media only screen and (max-width: 600px) {
            .wrapper {
                padding: 15px 10px;
            }
            .content {
                padding: 30px 20px 20px;
            }
            .footer {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <!-- 頂部區塊 -->
            <div class="header">
                <div style="margin-bottom: 15px;">
                    <img src="cid:logoImage" alt="Fuku Bank Logo" style="height: 80px; max-width: 100%;">
                </div>
                <h1 class="header-logo">Fuku Bank<img src="cid:sealImage" alt="福庫" style="height: 36px; vertical-align: middle; margin-left: 12px;"></h1>
                <div class="header-subtitle">靜心理財 安穩致遠</div>
            </div>
            
            <!-- 主要內容 -->
            <div class="content">
                <h2 class="greeting"><span th:text="${customerName}"></span> 您好：</h2>
                <p>您的貸款已核准並完成撥款，附件為依最終填單內容產生之貸款契約書，請留存備查。</p>
                
                <table class="data-table">
                    <tr>
                        <th>契約編號</th>
                        <td style="font-weight: bold; color: #3e3a35;" th:text="${contractNo}"></td>
                    </tr>
                </table>
                
                <p>本信件檢附之 PDF 契約書已以您的身分安全加密處理，請使用相關密碼開啟。</p>
                <p>感謝您選擇 Fuku Bank。</p>
            </div>
            
            <!-- 底部區塊 -->
            <div class="footer">
                <p>此為系統自動發送之信件，請勿直接回覆。</p>
                <p>如需協助，請聯繫我們的客服中心。</p>
                <div class="footer-logo">福庫銀行 Fuku Bank</div>
            </div>
        </div>
    </div>
</body>
</html>
